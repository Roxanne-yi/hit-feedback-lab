<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover" />
  <title>Dark Dungeon Web Demo - Phase 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; background: #1a1a1a; }
    #canvas { display: block; width: 100%; height: 100%; touch-action: none; position: relative; z-index: 0; }

    /* 安全区 */
    .safe-top { padding-top: env(safe-area-inset-top, 0); }
    .safe-left { padding-left: env(safe-area-inset-left, 0); }
    .safe-right { padding-right: env(safe-area-inset-right, 0); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0); }

    /* 左上角：小地图 + 血条/金币 */
    #hudTopLeft {
      position: fixed; top: 0; left: 0; z-index: 15;
      padding: 8px; padding-top: max(8px, env(safe-area-inset-top)); padding-left: max(8px, env(safe-area-inset-left));
      display: flex; flex-direction: column; gap: 6px; pointer-events: none;
    }
    #hudTopLeft > * { pointer-events: auto; }
    #minimapContainer {
      width: 120px; height: 120px; min-width: 100px; min-height: 100px;
      max-width: 150px; max-height: 150px; border-radius: 8px;
      border: 2px solid rgba(180,160,100,0.6); background: rgba(20,20,25,0.85);
      overflow: hidden; position: relative;
    }
    #minimapCanvas { display: block; width: 100%; height: 100%; }
    #minimapArrow {
      position: absolute; left: 50%; top: 50%; width: 0; height: 0;
      margin-left: -8px; margin-top: -12px;
      border-left: 8px solid transparent; border-right: 8px solid transparent;
      border-bottom: 14px solid rgba(255,200,80,0.95); pointer-events: none;
      transform-origin: 50% 60%;
    }
    #minimapEnemyMarker, .minimap-enemy-marker {
      position: absolute; width: 10px; height: 10px; border-radius: 50%;
      background: rgba(220,60,60,0.95); border: 1px solid rgba(255,200,200,0.8);
      pointer-events: none; transform: translate(-50%, -50%);
    }
    #hudStats { display: flex; flex-direction: column; gap: 4px; }
    @keyframes globalShake {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(calc(var(--s-int) * -1), var(--s-int)); }
      50%  { transform: translate(var(--s-int), calc(var(--s-int) * -1)); }
      75%  { transform: translate(calc(var(--s-int) * -1), calc(var(--s-int) * -1)); }
      100% { transform: translate(0, 0); }
    }
    .shake-active {
      --s-int: 5px;
      animation: globalShake 0.15s ease-in-out !important;
    }
    #hp-container {
      background-color: #000000 !important;
      position: relative;
      z-index: 1;
      width: 200px; height: 20px;
      overflow: hidden;
      border-radius: 4px;
    }
    #hp-container.hit-highlight { box-shadow: 0 0 12px rgba(255,180,100,0.8); }
    #hp-ghost {
      background-color: orange !important;
      position: absolute; top: 0; left: 0; height: 100%; width: 100%;
      z-index: 10;
      pointer-events: none;
    }
    #hp-main {
      background-color: #4CAF50 !important;
      position: absolute; top: 0; left: 0; height: 100%; width: 100%;
      z-index: 20;
      transition: none !important;
    }
    #hp-text {
      position: absolute !important;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999 !important;
      pointer-events: none;
      color: white;
      font: bold 12px sans-serif;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    #goldText { font: 12px/1.4 sans-serif; color: rgba(255,215,100,0.95); text-shadow: 0 0 4px rgba(0,0,0,0.8); }

    /* 右上角：设置 */
    #btnSettings {
      position: fixed; top: max(8px, env(safe-area-inset-top)); right: max(12px, env(safe-area-inset-right)); z-index: 15;
      width: 40px; height: 40px; border-radius: 8px;
      border: 2px solid rgba(180,160,100,0.5); background: rgba(40,35,30,0.85);
      color: rgba(255,215,150,0.9); font-size: 14px; touch-action: manipulation;
    }
    #btnSettings:active { transform: scale(0.95); background: rgba(60,55,45,0.9); }
    #btnAudio {
      position: fixed; top: max(8px, env(safe-area-inset-top)); right: calc(max(12px, env(safe-area-inset-right)) + 46px); z-index: 15;
      width: 40px; height: 40px; border-radius: 8px;
      border: 1px solid rgba(180,160,100,0.35); background: rgba(25,22,18,0.55);
      color: rgba(255,215,150,0.92); font-size: 14px; touch-action: manipulation;
      backdrop-filter: blur(8px) saturate(1.1);
      transition: transform 0.08s, background 0.12s, border-color 0.12s;
    }
    #btnAudio:hover { border-color: rgba(180,160,100,0.55); background: rgba(35,30,24,0.7); }
    #btnAudio:active { transform: scale(0.95); background: rgba(55,48,38,0.75); }

    #audioPanel {
      position: fixed;
      top: calc(max(8px, env(safe-area-inset-top)) + 48px);
      right: max(12px, env(safe-area-inset-right));
      width: 220px;
      min-height: 180px;
      z-index: 30;
      border-radius: 10px;
      background: rgba(20, 20, 20, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.10);
      box-shadow: 0 18px 48px rgba(0,0,0,0.55);
      backdrop-filter: blur(10px) saturate(1.15);
      color: rgba(245, 245, 245, 0.92);
      font-family: "Noto Sans SC", system-ui, sans-serif;
      padding: 10px 10px 10px;
      opacity: 0;
      transform: translateY(-6px) scale(0.98);
      pointer-events: none;
      transition: opacity 0.14s ease, transform 0.18s cubic-bezier(0.22,1,0.36,1);
    }
    #audioPanel.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    #audioPanelHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 2px 2px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 8px;
    }
    #audioPanelTitle {
      font-family: "Outfit", "Noto Sans SC", sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.06em;
      color: rgba(255, 235, 200, 0.92);
      text-transform: uppercase;
      user-select: none;
    }
    #audioPanelClose {
      width: 26px; height: 26px;
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.25);
      color: rgba(255,255,255,0.88);
      cursor: pointer;
      transition: transform 0.08s, background 0.12s;
    }
    #audioPanelClose:active { transform: scale(0.96); background: rgba(0,0,0,0.35); }
    .audioRow { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .audioLabel { font-size: 10px; letter-spacing: 0.08em; opacity: 0.78; text-transform: uppercase; }
    .audioSelect, .audioInput {
      width: 100%;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(10,10,10,0.55);
      color: rgba(255,255,255,0.92);
      padding: 7px 8px;
      outline: none;
    }
    .audioSelect:focus, .audioInput:focus { border-color: rgba(232, 184, 74, 0.55); box-shadow: 0 0 0 3px rgba(232,184,74,0.12); }
    .audioRange {
      width: 100%;
      accent-color: rgba(232, 184, 74, 0.95);
      height: 4px;
    }
    #audioAdvancedToggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.18);
      font-size: 11px;
      color: rgba(210, 216, 224, 0.88);
      transition: background 0.12s, border-color 0.12s;
      margin-top: 2px;
    }
    #audioAdvancedToggle:hover { border-color: rgba(255,255,255,0.14); background: rgba(0,0,0,0.24); }
    #audioAdvanced {
      margin-top: 8px;
      display: none;
    }
    #audioAdvanced.open { display: block; }
    .audioHelp { font-size: 10px; opacity: 0.68; line-height: 1.35; margin-top: 2px; }

    .skill-cancel-zone {
      display: none;
      position: fixed;
      right: max(16px, env(safe-area-inset-right));
      top: max(70px, env(safe-area-inset-top));
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(180, 60, 60, 0.35);
      border: 3px solid rgba(220, 80, 80, 0.9);
      color: rgba(255, 220, 220, 0.95);
      font-size: 14px;
      font-weight: bold;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.2;
      padding: 10px;
      z-index: 20;
      pointer-events: none;
    }
    .skill-cancel-zone.visible {
      display: flex;
    }

    /* 左侧中部：任务提示 */
    #hudHint {
      position: fixed; left: max(8px, env(safe-area-inset-left)); top: 50%; transform: translateY(-50%); z-index: 12;
      max-width: 140px; padding: 6px 10px; border-radius: 6px;
      background: rgba(30,28,25,0.75); border: 1px solid rgba(180,160,100,0.35);
      font: 11px/1.4 sans-serif; color: rgba(255,240,200,0.9); pointer-events: none;
    }

    /* 左侧摇杆 */
    #joystickZone {
      position: fixed; left: 0; bottom: 0;
      width: 40%; max-width: 200px; height: 40%; max-height: 200px;
      padding-left: env(safe-area-inset-left, 0); padding-bottom: env(safe-area-inset-bottom, 0);
      display: flex; align-items: center; justify-content: center;
      touch-action: none; z-index: 10;
    }
    #joystickBase {
      width: 120px; height: 120px; border-radius: 50%;
      background: rgba(80,80,80,0.6); border: 2px solid rgba(255,255,255,0.3);
      position: relative; touch-action: none;
    }
    #joystickKnob {
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(200,200,200,0.9); border: 2px solid rgba(255,255,255,0.5);
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%); pointer-events: none;
      transition: transform 0.05s ease-out;
    }

    /* 右侧触摸区：旋转视角 */
    #cameraZone {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 55%; touch-action: none; z-index: 5;
    }

    /* 右下角：攻击 + 技能 + 跳跃/下蹲（Phase 2 HUD） */
    #hudBottomRight {
      position: fixed; right: 0; bottom: 0; z-index: 10;
      padding: 12px; padding-right: max(12px, env(safe-area-inset-right)); padding-bottom: max(12px, env(safe-area-inset-bottom));
      display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
    }
    .action-row { display: flex; align-items: center; gap: 8px; }
    .btn-action {
      border-radius: 12px; border: 2px solid rgba(180,160,100,0.5);
      background: rgba(40,35,30,0.85); color: rgba(255,230,180,0.95);
      font-weight: bold; touch-action: manipulation; user-select: none;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: transform 0.08s, background 0.08s;
    }
    .btn-action:active { transform: scale(0.92); background: rgba(70,60,50,0.9); }
    .btn-action.disabled { pointer-events: none; opacity: 0.7; }
    .attack-column {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .attack-auto-label {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 600; color: rgba(255, 230, 180, 0.92);
      user-select: none; cursor: pointer; white-space: nowrap;
    }
    .attack-auto-label input { width: 14px; height: 14px; accent-color: #d4af37; cursor: pointer; }
    #btnAttack { width: 64px; height: 64px; font-size: 14px; }
    .btn-action.btn-attack-continuous {
      border-color: rgba(212, 175, 55, 0.95) !important;
      background: rgba(85, 65, 38, 0.95) !important;
      box-shadow: 0 0 14px rgba(212, 175, 55, 0.4), inset 0 0 12px rgba(212, 175, 55, 0.12);
      transform: scale(0.96);
    }
    .skill-group { display: flex; gap: 6px; }
    .btn-skill { width: 44px; height: 44px; font-size: 11px; position: relative; }
    .btn-key-hint { display: block; font-size: 9px; opacity: 0.85; margin-top: 2px; font-weight: normal; }
    .skill-cooldown {
      position: absolute; inset: 0; border-radius: 10px;
      background: rgba(0,0,0,0.6); pointer-events: none;
      opacity: 0; transition: opacity 0.2s;
    }
    .skill-cooldown.active { opacity: 1; }
    .btn-move { width: 48px; height: 48px; font-size: 11px; }
    /* 受击跳字：强制置顶渲染层，确保在 canvas 之上 */
    #floatingDamageContainer {
      position: fixed; left: 0; top: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 99999; display: block; overflow: visible;
    }
    .floating-damage {
      position: absolute; z-index: 99999; pointer-events: none;
      font: bold 18px sans-serif; color: #ff4444;
      text-shadow: 0 0 4px #000, 0 0 8px rgba(0,0,0,0.9); white-space: nowrap;
      transform: translate(-50%, 0); display: flex; align-items: center; gap: 4px; visibility: visible; opacity: 1;
    }
    .floating-damage .critical-icon,
    .floating-damage .heal-icon { flex-shrink: 0; width: 1em; height: 1em; display: inline-block; vertical-align: middle; }
    /* 挂在模型上的 2D 血条：屏幕坐标定位，不随远近和视角变化 */
    #worldBarsContainer { position: fixed; left: 0; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: 14; }
    #playerWorldBar {
      position: absolute;
      z-index: 1000 !important;
    }
    .enemy-bar-container {
      position: absolute;
      z-index: 100;
    }
    .world-bar-wrap {
      position: absolute; width: 120px; height: 8px;
      transform: translate(-50%, -100%); margin-top: -6px;
      border-radius: 4px; overflow: visible; border: 1px solid rgba(0,0,0,0.4);
    }
    .world-bar-inner { position: relative; width: 100%; height: 100%; }
    .world-bar-container { overflow: hidden; border-radius: 4px; background: rgba(0,0,0,0.5); }
    .world-bar-wrap .world-bar-back,
    .world-bar-wrap .world-bar-ghost,
    .world-bar-wrap .world-bar-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 4px; }
    .world-bar-back { width: 100%; background: rgba(0,0,0,0.5); z-index: 0; }
    .world-bar-ghost { width: 100%; z-index: 10; pointer-events: none; background: rgba(255,100,100,0.9); }
    .world-bar-fill { transition: none; z-index: 20; }
    #playerWorldBar .world-bar-fill { background: linear-gradient(90deg, #2a6b2a, #4aca4a); }
    .world-bar-wrap.enemy-bar .world-bar-fill { background: linear-gradient(90deg, #6b1a1a, #cc3333); }

    /* Phase 5: Debug 面板 — 依据 frontend-design：工业 HUD / 地牢工坊，层次与动效，不改逻辑 */
    @keyframes debugPanelSlideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes debugHeroShine {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.55; }
    }
    /* 与面板实际宽度一致（min(33.33vw,420px)），避免宽屏上画布仍从 33.33% 起算留下黑条 */
    body.debug-hit-feedback {
      --debug-panel-width: min(33.33vw, 420px);
      --dbg-inset: 12px;
    }
    body.debug-hit-feedback #canvas {
      position: fixed; top: 0; bottom: 0; right: 0;
      left: var(--debug-panel-width);
      width: calc(100% - var(--debug-panel-width));
      z-index: 0;
    }
    body.debug-hit-feedback #debugHitFeedbackPanel {
      --dbg-accent: #2ee8d6;
      --dbg-accent-soft: rgba(46, 232, 214, 0.22);
      --dbg-gold: #e8b84a;
      --dbg-gold-dim: rgba(232, 184, 74, 0.35);
      --dbg-ink: #080a0d;
      --dbg-panel: rgba(12, 14, 18, 0.92);
      --dbg-font: "Noto Sans SC", "Outfit", system-ui, sans-serif;
      --dbg-display: "Outfit", "Noto Sans SC", sans-serif;
      position: fixed; left: 0; top: 0; bottom: 0; width: var(--debug-panel-width);
      z-index: 25;
      overflow-x: hidden; overflow-y: auto;
      padding: 0 0 24px;
      padding-top: max(0px, env(safe-area-inset-top));
      font-family: var(--dbg-font);
      color: rgba(238, 236, 230, 0.92);
      background:
        linear-gradient(165deg, rgba(46, 232, 214, 0.06) 0%, transparent 42%),
        linear-gradient(225deg, rgba(232, 184, 74, 0.05) 0%, transparent 38%),
        var(--dbg-panel);
      backdrop-filter: blur(14px) saturate(1.15);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 4px 0 32px rgba(0, 0, 0, 0.45), inset -1px 0 0 var(--dbg-accent-soft);
      animation: debugPanelSlideIn 0.38s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    body.debug-hit-feedback #debugHitFeedbackPanel::before {
      content: "";
      position: fixed; left: 0; top: 0; bottom: 0; width: var(--debug-panel-width);
      pointer-events: none; z-index: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
    }
    .debug-panel-hero {
      position: relative; z-index: 1;
      padding: 14px var(--dbg-inset) 12px;
      margin-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04) 0%, transparent 100%);
    }
    .debug-panel-hero::after {
      content: "";
      position: absolute; left: var(--dbg-inset); right: var(--dbg-inset); bottom: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--dbg-accent), var(--dbg-gold), transparent);
      opacity: 0.5; animation: debugHeroShine 4s ease-in-out infinite;
    }
    .debug-panel-kicker {
      font-family: var(--dbg-display);
      font-size: 10px; font-weight: 600; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--dbg-accent);
      margin-bottom: 6px; opacity: 0.9;
    }
    .debug-panel-title {
      font-family: var(--dbg-display);
      font-size: 1.35rem; font-weight: 700; letter-spacing: 0.02em;
      color: #f4f1ea;
      margin: 0 0 14px 0;
      line-height: 1.15;
      text-shadow: 0 0 24px rgba(46, 232, 214, 0.15);
    }
    .debug-panel-hero-hint {
      margin: 0 0 12px 0; font-size: 11px; line-height: 1.4;
      color: rgba(46, 232, 214, 0.65); font-family: var(--dbg-font, sans-serif);
    }
    body.debug-hit-feedback #debugHitFeedbackPanel > .lil-gui {
      position: relative; z-index: 1;
      margin: 0 var(--dbg-inset); padding: 10px 10px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    body.debug-hit-feedback #debugHitFeedbackPanel > .lil-gui + .lil-gui {
      margin-top: 10px;
    }
    body.debug-hit-feedback #debugHitFeedbackPanel .lil-gui {
      width: 100% !important; max-width: 100%;
      --lil-gui-font-family: var(--dbg-font);
      background: transparent !important;
      font-size: 11px !important;
    }
    body.debug-hit-feedback #debugHitFeedbackPanel .lil-gui.root { box-shadow: none !important; }
    body.debug-hit-feedback #debugHitFeedbackPanel .lil-gui > .title {
      font-family: var(--dbg-display) !important;
      font-size: 12px !important; font-weight: 700 !important;
      letter-spacing: 0.06em !important;
      color: #d9b56a !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 10px !important; margin-bottom: 8px !important;
    }
    body.debug-hit-feedback #debugHitFeedbackPanel .lil-gui .title {
      color: rgba(244, 241, 234, 0.92) !important;
    }
    body.debug-hit-feedback #debugHitFeedbackPanel .lil-gui .folder > .title {
      padding: 8px 0 8px 10px !important;
      margin: 6px 0 4px !important;
      border-left: 3px solid var(--dbg-accent);
      border-radius: 0 6px 6px 0;
      background: linear-gradient(90deg, var(--dbg-accent-soft), transparent);
      font-weight: 600 !important;
    }
    body.debug-hit-feedback #debugHitFeedbackPanel .lil-gui .controller {
      padding: 6px 8px !important; margin: 0 !important; min-height: 0 !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    body.debug-hit-feedback #debugHitFeedbackPanel .lil-gui .controller > div:not(.direction-btns):not(.anim-dir-label) {
      display: flex !important; flex-direction: row !important; align-items: center !important;
      justify-content: space-between !important; gap: 8px !important; width: 100% !important;
    }
    body.debug-hit-feedback #debugHitFeedbackPanel .lil-gui li.controller:has(.anim-dir-label) {
      display: flex !important; flex-direction: column !important; align-items: stretch !important;
      gap: 4px !important; padding: 10px 8px !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    body.debug-hit-feedback #debugHitFeedbackPanel .lil-gui .controller .widget,

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script src="https://cdn.jsdelivr.net/gh/KLA6/cannon-es-umd@v0.20.0/cannon-es.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@18.6.4/dist/tween.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19/dist/lil-gui.umd.min.js"></script>
  <script type="module">
    import * as THREE from 'three';

    const PATH_GUN = './assets/sound/gun_fire.mp3';
    const PATH_DAGGER = './assets/sound/sword_slash.mp3';
    const PATH_BLUNT = './assets/sound/hammer_hit.mp3';

    const canvas = document.getElementById('canvas');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    function resize() {
      let w = window.innerWidth, h = window.innerHeight;
      if (document.body.classList.contains('debug-hit-feedback')) {
        const panelEl = document.getElementById('debugHitFeedbackPanel');
        const pw = panelEl ? Math.round(panelEl.getBoundingClientRect().width) : 0;
        w = Math.max(1, Math.floor(window.innerWidth - pw));
      }
      camera.aspect = w / h; camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      if (typeof resizeMinimap === 'function') resizeMinimap();
    }
    window.addEventListener('resize', resize);

    // ---------- 小地图：独立正交相机 + 独立 Canvas 与 Renderer（不碰主 renderer） ----------
    const MINIMAP_SIZE = 20;
    const minimapCamera = new THREE.OrthographicCamera(-MINIMAP_SIZE/2, MINIMAP_SIZE/2, MINIMAP_SIZE/2, -MINIMAP_SIZE/2, 0.1, 100);
    const minimapCanvas = document.getElementById('minimapCanvas');
    let minimapRenderer = null;
    let useMinimap = false;
    try {
      minimapRenderer = new THREE.WebGLRenderer({ canvas: minimapCanvas, antialias: false, alpha: false });
      minimapRenderer.setClearColor(0x1a1a22);
      minimapRenderer.setPixelRatio(1);
      useMinimap = true;
    } catch (e) { console.warn('Minimap WebGL init skipped:', e); }
    const minimapContainer = document.getElementById('minimapContainer');
    const minimapArrow = document.getElementById('minimapArrow');
    function resizeMinimap() {
      if (!useMinimap || !minimapRenderer) return;
      const r = minimapContainer.getBoundingClientRect();
      const s = Math.min(150, Math.max(100, Math.floor(Math.min(r.width, r.height))));
      if (s <= 0) return;
      minimapCanvas.width = s;
      minimapCanvas.height = s;
      minimapRenderer.setSize(s, s);
    }

    resize();
    const world = new CANNON.World();
    world.gravity.set(0, -20, 0);
    world.broadphase = new CANNON.SAPBroadphase(world);
    world.allowSleep = false;
    if (world.solver) {
      world.solver.iterations = 20;
      if (world.solver.tolerance !== undefined) world.solver.tolerance = 1e-7;
    }

    const playerPhysMaterial = new CANNON.Material('char');
    const enemyPhysMaterial = new CANNON.Material('enemy');
    const playerEnemyContact = new CANNON.ContactMaterial(playerPhysMaterial, enemyPhysMaterial, {
      friction: 0,
      restitution: 0.1,
      contactEquationStiffness: 1e7,
      contactEquationRelaxation: 2
    });
    world.addContactMaterial(playerEnemyContact);

    // ---------- CharacterManager（含 loadModel 预留） ----------
    const CAPSULE_HEIGHT = 1.8;
    const CAPSULE_RADIUS = 0.4;
    const CAPSULE_CYLINDER_HALF = (CAPSULE_HEIGHT - 2 * CAPSULE_RADIUS) / 2;
    const ENEMY_HALF_W = 0.4, ENEMY_HALF_D = 0.25;
    const CROUCH_SCALE = 0.6;

    const CHARACTER_STATES = { IDLE: 'idle', RUN: 'run', JUMP: 'jump', CROUCH: 'crouch', ATTACK: 'attack' };

    class CharacterManager {
      constructor() {
        this.group = new THREE.Group();
        this.visualMesh = null;
        this.frontIndicator = null;
        this.body = null;
        this.defaultCapsuleHeight = CAPSULE_HEIGHT;
        this.isCrouching = false;
        this.characterState = CHARACTER_STATES.IDLE;
        this._buildPlaceholder();
      }

      _buildPlaceholder() {
        const totalLen = CAPSULE_HEIGHT - 2 * CAPSULE_RADIUS;
        const geom = new THREE.CapsuleGeometry(CAPSULE_RADIUS, Math.max(0.01, totalLen), 8, 16);
        const mat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
        this.visualMesh = new THREE.Mesh(geom, mat);
        this.visualMesh.castShadow = true;
        this.visualMesh.receiveShadow = true;
        this.visualMesh.position.y = CAPSULE_CYLINDER_HALF;
        this.group.add(this.visualMesh);

        const indicatorGeom = new THREE.BoxGeometry(0.15, 0.2, 0.05);
        const indicatorMat = new THREE.MeshBasicMaterial({ color: 0xff6600 });
        this.frontIndicator = new THREE.Mesh(indicatorGeom, indicatorMat);
        this.frontIndicator.position.set(0, CAPSULE_CYLINDER_HALF, CAPSULE_RADIUS + 0.1);
        this.group.add(this.frontIndicator);

        const halfHeight = CAPSULE_CYLINDER_HALF;
        const shape = new CANNON.Cylinder(CAPSULE_RADIUS, CAPSULE_RADIUS, CAPSULE_HEIGHT - 2 * CAPSULE_RADIUS, 12);
        this.body = new CANNON.Body({ mass: 80, material: playerPhysMaterial, linearDamping: 0.3, angularDamping: 0.99 });
        this.body.addShape(shape);
        this.body.fixedRotation = true;
        this.body.position.set(0, CAPSULE_CYLINDER_HALF, 0);
        world.addBody(this.body);
      }

      loadModel(url) {

      const pos = character.body.position;
      const offset = CAM_OFFSET.clone().applyEuler(new THREE.Euler(cameraPitch, cameraYaw, 0, 'YXZ'));
      camTarget.copy(pos).add(offset);
      camPos.lerp(camTarget, 1 - Math.exp(-CAM_LERP * dt * 60));

      const maxR = r.width / 2 - 25;
      let dx = t.clientX - (r.left + r.width / 2);
      let dy = t.clientY - (r.top + r.height / 2);
      const len = Math.hypot(dx, dy) || 1;
      if (len > maxR) { dx *= maxR / len; dy *= maxR / len; }
      joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      joystickVector.x = dx / maxR;
      joystickVector.y = -dy / maxR;

    // ---------- Phase 2/3：攻击键（连招预留）+ 攻击表现（Dash/Squash/弧光/Hit Stop） ----------
    let lastAttackTime = 0;
    let attackHoldActive = false;
    let attackAutoContinuous = false;
    let attackRepeatTimerId = null;
    let hudRepeatPhaseAnchor = 0;
    let hudAttackRepeatLastFireWall = 0;
    let hudAttackRepeatLogEvery = 0;
    /** 指针按下已触发连击逻辑时，忽略随后的合成 click，避免单击/触摸打出两下 */
    let attackSuppressNextClick = false;
    let attackSuppressClickClearTimer = null;
    function armAttackClickSuppress() {
      attackSuppressNextClick = true;
      if (attackSuppressClickClearTimer) clearTimeout(attackSuppressClickClearTimer);
      attackSuppressClickClearTimer = setTimeout(function() {
        attackSuppressNextClick = false;
        attackSuppressClickClearTimer = null;
      }, 550);
    }
    const COMBO_WINDOW = 0.5;
    const DASH_DIST = 0.5;
    const DASH_DURATION_MS_BASE = 100;
    const RETURN_DURATION_MS_BASE = 250;
    /** 完整挥砍 tween 链大致占用时长；连击间隔小于此值时需「仅结算」额外 tick，否则 20Hz 会被 isAttacking 挡掉 */
    function getFullAttackAnimBlockMs() {
      const dashMs = Math.round(DASH_DURATION_MS_BASE / Math.max(0.05, attackSpeedMultiplier || 1));
      const returnMs = Math.round(RETURN_DURATION_MS_BASE / Math.max(0.05, attackSpeedMultiplier || 1));
      return dashMs + returnMs + (attackHitStopMs || 0) + 80;
    }

    /** 仅锁定、伤害与可见性（无位移/挤压/弧光 tween）— 供高频连击在动画未结束时补结算 */
    function applySlashHitOnly() {
      const LOCK_ON_CONE_HALF_ANGLE = (45 * Math.PI) / 180;
      const lockTarget = getNearestEnemyInCone(LOCK_ON_CONE_HALF_ANGLE);
      if (lockTarget) {
        const dx = lockTarget.position.x - character.body.position.x;
        const dz = lockTarget.position.z - character.body.position.z;
        if (dx * dx + dz * dz > 1e-6) characterFacingYaw = Math.atan2(dx, dz);
      }
      if (AudioBus && typeof AudioBus.play === 'function') AudioBus.play();
      const inDebugMode = document.body.classList.contains('debug-hit-feedback') && typeof hitFeedbackParams !== 'undefined';
      const attackDamage = inDebugMode ? hitFeedbackParams.testDamage : ATTACK_DAMAGE;
      const useTestModeCrit = !!inDebugMode;
      const hitCount = checkSlashAoEHit(attackDamage, useTestModeCrit);
      updateEnemyVisible();
      return hitCount;
    }

    function runAttackAnimation() {
      const TWEEN = window.TWEEN;
      if (!TWEEN) {
        isAttacking = false;
        updateCharacterState();
        return;
      }
      try { spawnMuzzleFlash(); } catch (e) { try { console.warn('[muzzle] spawn failed', e); } catch (e2) {} }
      const hitCount = applySlashHitOnly();
      const didHit = hitCount > 0;
      const baseReturnDelay = didHit ? ((attackHitStopMs || 0) + (hitCount > 1 ? (hitCount - 1) * 20 : 0)) : 0;
      const returnDelay = baseReturnDelay + Math.max(0, (floatingTextHitStopUntil || 0) - performance.now());
      const characterRot = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), characterFacingYaw);
      const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(characterRot);
      attackOffset.set(0, 0, 0);
      const targetDash = { x: forward.x * DASH_DIST, y: 0, z: forward.z * DASH_DIST };
      const dashMs = Math.round(DASH_DURATION_MS_BASE / Math.max(0.05, attackSpeedMultiplier || 1));
      const returnMs = Math.round(RETURN_DURATION_MS_BASE / Math.max(0.05, attackSpeedMultiplier || 1));

      const tweenDashOut = new TWEEN.Tween(attackOffset).to(targetDash, dashMs).easing(TWEEN.Easing.Quadratic.Out);
      const tweenDashBack = new TWEEN.Tween(attackOffset).to({ x: 0, y: 0, z: 0 }, returnMs).easing(TWEEN.Easing.Exponential.Out).delay(returnDelay)
        .onComplete(() => {

      tweenDashOut.chain(tweenDashBack);
      tweenDashOut.start();

      character.visualMesh.scale.set(1.2, 0.8, 1.2);
      const tweenStretch = new TWEEN.Tween(character.visualMesh.scale).to({ x: 0.8, y: 1.4, z: 0.8 }, dashMs);
      const finalScaleY = character.isCrouching ? CROUCH_SCALE : 1;
      const tweenRecover = new TWEEN.Tween(character.visualMesh.scale).to({ x: 1, y: finalScaleY, z: 1 }, returnMs + 50).easing(TWEEN.Easing.Elastic.Out).delay(returnDelay);
      tweenStretch.chain(tweenRecover);
      tweenStretch.start();

      // 1. 创建几何体：默认在 XY 平面，开口向上
      const swingArcGeom = new THREE.RingGeometry(0.2, 1.2, 16, 1, 0, (Math.PI * 2) / 3);
      const swingArcMat = new THREE.MeshBasicMaterial({
        color: 0xd4af37,
        transparent: true,
        opacity: 0.6,
        side: THREE.DoubleSide
      });
      const swingArc = new THREE.Mesh(swingArcGeom, swingArcMat);
      // 基础：将 XY 平面压平到 XZ 平面
      const tiltDown = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), -Math.PI / 2);
      // 修正：偏移 180 度 (Math.PI) 解决弧光与胶囊正面（橘色块 +Z）反向问题；RingGeometry 0 度起点与 Z 轴对齐
      const directionOffset = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI);
      // 组合：全局朝向 * 修正偏移 * 压平
      swingArc.quaternion.copy(characterRot).multiply(directionOffset).multiply(tiltDown);
      swingArc.position.copy(character.body.position).add(forward.clone().multiplyScalar(0.8));
      swingArc.position.y = 0.5;
      scene.add(swingArc);
      // 4. 动画：绕弧面法线（压平后为 Y）在局部 Z 轴扫动，弧光贴地
      const swingStart = { rot: 0, op: 0.6 };
      const swingEnd = { rot: 1.2, op: 0 };
      const initialQuat = swingArc.quaternion.clone();
      const tweenSwing = new TWEEN.Tween(swingStart).to(swingEnd, 200).onUpdate(() => {
        const sweepQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), swingStart.rot);
        swingArc.quaternion.copy(initialQuat).multiply(sweepQuat);
        swingArcMat.opacity = swingStart.op;
      }).onComplete(() => {
        scene.remove(swingArc);
        swingArcGeom.dispose();
        swingArcMat.dispose();
      });
      tweenSwing.start();
    }

    const btnAttack = document.getElementById('btnAttack');
    const chkAttackAuto = document.getElementById('chkAttackAuto');
    const AudioBus = (function () {
      const state = {
        weaponType: 'dagger',
        volume: 0.8,
        paths: {
          gun: PATH_GUN,
          dagger: PATH_DAGGER,
          blunt: PATH_BLUNT
        },
        audios: { gun: null, dagger: null, blunt: null },
        warmed: false,
        unlockPrimed: false,
        loading: { gun: false, dagger: false, blunt: false }
      };
      function normalizeAssetPath(p) {
        const s0 = String(p || '').trim();
        if (!s0) return '';
        try {
          if (/^https?:\/\//i.test(s0)) {
            const u = new URL(s0);
            const pn = (u.pathname || '').replace(/^\/+/, '');
            return pn ? ('./' + pn) : '';
          }
        } catch (e) {}
        if (s0.startsWith('./')) return s0;
        if (s0.startsWith('/')) return './' + s0.replace(/^\/+/, '');
        if (s0.startsWith('assets/')) return './' + s0;
        return s0;
      }
      function resolveToSrc(p) {
        const rel = normalizeAssetPath(p);
        try {
          // Full URL so GitHub/Gitee Pages subpaths (e.g. /repo-name/) resolve correctly.
          const u = new URL(rel, window.location.href);
          return u.href;
        } catch (e) {
          return rel;
        }
      }
      function setLoading(type, on) {
        if (state.loading[type] === undefined) return;
        state.loading[type] = !!on;
        const statusEl = document.getElementById('audioPanelStatus');
        if (!statusEl) return;
        const anyLoading = !!(state.loading.gun || state.loading.dagger || state.loading.blunt);
        statusEl.style.display = anyLoading ? '' : 'none';
      }
      function ensureAudio(type) {
        if (state.audios[type]) return state.audios[type];
        const a = new Audio();
        a.preload = 'auto';
        a.src = resolveToSrc(state.paths[type] || '');
        a.onerror = function () {
          try { console.warn('[AudioBus] audio error', type, 'src=', a.src); } catch (e) {}
          setLoading(type, false);
        };
        state.audios[type] = a;
        return a;
      }
      function warmUp() {
        if (state.warmed) return;
        state.warmed = true;
        ['gun', 'dagger', 'blunt'].forEach(function (t) {
          const a = ensureAudio(t);
          try { a.load(); } catch (e) {}
        });
      }
      function forcePreload(type) {
        if (type !== 'gun' && type !== 'dagger' && type !== 'blunt') return;
        const a = ensureAudio(type);
        try {
          const src = resolveToSrc(state.paths[type] || '');
          if (a.src !== src && src) a.src = src;
          setLoading(type, true);
          a.load();
          const clear = function () { setLoading(type, false); };
          a.addEventListener('canplaythrough', clear, { once: true });
          a.addEventListener('canplay', clear, { once: true });
          a.addEventListener('loadeddata', clear, { once: true });
        } catch (e) { setLoading(type, false); }
      }
      function setWeaponType(type) {
        if (type !== 'gun' && type !== 'dagger' && type !== 'blunt') return;
        state.weaponType = type;
        forcePreload(type);
      }
      function setVolume(v01) {
        const v = Math.max(0, Math.min(1, v01 == null ? 1 : v01));
        state.volume = v;
      }
      function setPath(type, p) {
        if (!state.paths[type]) return;
        state.paths[type] = normalizeAssetPath(p);
        if (state.audios[type]) {
          try { state.audios[type].src = resolveToSrc(state.paths[type]); forcePreload(type); } catch (e) {}
        }

        if (state.unlockPrimed) return;

        warmUp();
        ['gun', 'dagger', 'blunt'].forEach(function (t) {
          const a = ensureAudio(t);
          try {
            const prevVol = a.volume;
            a.volume = 0;
            const p = a.play();
            if (p && typeof p.then === 'function') {
              p.then(function () {

              }).catch(function () {

              });

              a.currentTime = 0;
              a.volume = prevVol;
            }
          } catch (e) {}

        state._unlockHandlerInstalled = true;
        let fired = false;
        const once = function () {
          if (fired) return;
          fired = true;
          unlockOnce();
        };
        window.addEventListener('pointerdown', once, { once: true, passive: true });
        window.addEventListener('touchstart', once, { once: true, passive: true });
        window.addEventListener('click', once, { once: true, passive: true });
      }
      function play() {
        ensureGlobalUnlockHandler();
        warmUp();
        const type = state.weaponType;
        const a = ensureAudio(type);
        try {
          const doPlay = function () {
            try {
              a.pause();
              a.currentTime = 0;
              a.volume = state.volume;
              const p = a.play();
              if (p && typeof p.catch === 'function') p.catch(function () {});

            console.warn('[AudioBus] not ready yet, will play when ready:', type, 'readyState=', a.readyState);
            forcePreload(type);
            const onReady = function () { doPlay(); };
            a.addEventListener('canplaythrough', onReady, { once: true });
            return;
          }
          doPlay();
        } catch (e) {}
      }
      ensureGlobalUnlockHandler();

    })();
    function syncCurvePreviewEditors() {
      const cvs = typeof window !== 'undefined' ? window.__curvePreviewCanvases : null;
      const refresh = typeof window !== 'undefined' ? window.__refreshCurvePreviews : null;
      if (!cvs) { if (typeof refresh === 'function') refresh(); return; }
      try {
        if (typeof hitFeedbackParams !== 'undefined' && hitFeedbackParams.motion && hitFeedbackParams.motion.speedCurve && cvs.speedEditor) {
          const vis = defaultSplineAnchorsFromPositions(keyframesToFourPoints(hitFeedbackParams.motion.speedCurve.keyframes || []));
          cvs.speedEditor.setSpline(vis);
        }
        if (typeof hitFeedbackParams !== 'undefined' && hitFeedbackParams.scale && hitFeedbackParams.scale.sizeCurve && cvs.sizeEditor) {
          const vis = defaultSplineAnchorsFromPositions(keyframesToFourPoints(hitFeedbackParams.scale.sizeCurve.keyframes || []));
          cvs.sizeEditor.setSpline(vis);
        }
        if (typeof hitFeedbackParams !== 'undefined' && hitFeedbackParams.fade && hitFeedbackParams.fade.alphaCurve && cvs.alphaEditor) {
          const vis = defaultSplineAnchorsFromPositions(keyframesToFourPoints(hitFeedbackParams.fade.alphaCurve.keyframes || []));
          cvs.alphaEditor.setSpline(vis);
        }
      } catch (e) {}
      if (typeof refresh === 'function') refresh();
    }
    function spawnMuzzleFlash() {
      if (!pendingMuzzleFlash) return;
      pendingMuzzleFlash = false;
      if (typeof THREE === 'undefined' || !scene || !character || !character.body) return;
      const TWEEN = window.TWEEN;
      const bp = character.body.position;
      const baseV3 = new THREE.Vector3(
        Number(bp && bp.x) || 0,
        Number(bp && bp.y) || 0,
        Number(bp && bp.z) || 0
      );
      const forward = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), characterFacingYaw);
      const pos = baseV3.clone().add(forward.multiplyScalar(0.55));
      pos.y += 1.05;
      const mat = new THREE.SpriteMaterial({ color: 0xffa300, transparent: true, opacity: 0.95, depthWrite: false });
      const sp = new THREE.Sprite(mat);
      sp.position.copy(pos);
      sp.scale.set(0.35, 0.35, 0.35);
      scene.add(sp);
      if (TWEEN) {
        const s = { op: 0.95, sc: 0.35 };
        new TWEEN.Tween(s).to({ op: 0, sc: 0.75 }, 110).easing(TWEEN.Easing.Quadratic.Out).onUpdate(function () {
          mat.opacity = s.op;
          sp.scale.set(s.sc, s.sc, s.sc);
        }).onComplete(function () {
          scene.remove(sp);
          mat.dispose();
        }).start();
      } else {
        setTimeout(function () {
          scene.remove(sp);
          mat.dispose();
        }, 120);
      }
    }
    function applyWeaponPreset(type) {
      currentWeaponType = type;
      if (type === 'gun') {
        weaponAttackRange = 15;
        attackSpeedMultiplier = 1.0;
        attackHitStopMs = 0;
        pendingMuzzleFlash = true;
        if (typeof hitFeedbackParams !== 'undefined') {
          hitFeedbackParams.floatingTextPreset = '重击';
          if (hitFeedbackParams.motion && hitFeedbackParams.motion.speedCurve) setCurveFromDisplay(hitFeedbackParams.motion.speedCurve, '爆发');
          if (hitFeedbackParams.scale && hitFeedbackParams.scale.sizeCurve) setCurveFromDisplay(hitFeedbackParams.scale.sizeCurve, '爆发');
          if (hitFeedbackParams.fade && hitFeedbackParams.fade.alphaCurve) setCurveFromDisplay(hitFeedbackParams.fade.alphaCurve, '清脆');
        }
      } else if (type === 'dagger') {
        weaponAttackRange = 2.5;
        attackSpeedMultiplier = 1.5;
        attackHitStopMs = 0;
        pendingMuzzleFlash = false;
        if (typeof hitFeedbackParams !== 'undefined') {
          hitFeedbackParams.floatingTextPreset = '流转连击';
          if (hitFeedbackParams.motion && hitFeedbackParams.motion.speedCurve) setCurveFromDisplay(hitFeedbackParams.motion.speedCurve, '平滑');
          if (hitFeedbackParams.scale && hitFeedbackParams.scale.sizeCurve) setCurveFromDisplay(hitFeedbackParams.scale.sizeCurve, '平滑');
          if (hitFeedbackParams.fade && hitFeedbackParams.fade.alphaCurve) setCurveFromDisplay(hitFeedbackParams.fade.alphaCurve, '平滑');
        }
      } else if (type === 'blunt') {
        weaponAttackRange = 2.5;
        attackSpeedMultiplier = 0.8;
        attackHitStopMs = 90;
        pendingMuzzleFlash = false;
        if (typeof hitFeedbackParams !== 'undefined') {
          hitFeedbackParams.floatingTextPreset = '重击';
          if (hitFeedbackParams.motion && hitFeedbackParams.motion.speedCurve) setCurveFromDisplay(hitFeedbackParams.motion.speedCurve, '回弹');
          if (hitFeedbackParams.scale && hitFeedbackParams.scale.sizeCurve) setCurveFromDisplay(hitFeedbackParams.scale.sizeCurve, '爆发');
          if (hitFeedbackParams.fade && hitFeedbackParams.fade.alphaCurve) setCurveFromDisplay(hitFeedbackParams.fade.alphaCurve, '清脆');
        }
      }
      if (AudioBus) { AudioBus.setWeaponType(type); }
      syncCurvePreviewEditors();
    }
    function updateAttackButtonContinuousVisual() {
      const on = attackHoldActive || attackAutoContinuous;
      if (btnAttack) {
        btnAttack.classList.toggle('btn-attack-continuous', on);
        btnAttack.setAttribute('aria-pressed', on ? 'true' : 'false');
      }
    }
    function stopAttackRepeatLoop() {
      if (attackRepeatTimerId != null) {
        clearTimeout(attackRepeatTimerId);
        attackRepeatTimerId = null;
      }
      hudRepeatPhaseAnchor = 0;
      hudAttackRepeatLastFireWall = 0;
      hudAttackRepeatLogEvery = 0;
    }
    /** 累加相位锚点：抵消单帧回调耗时，使 20Hz 时墙钟间隔贴近 50ms */
    function attackRepeatTick() {
      attackRepeatTimerId = null;
      if (!attackHoldActive && !attackAutoContinuous) {
        hudRepeatPhaseAnchor = 0;
        updateAttackButtonContinuousVisual();
        return;
      }
      var nowWall = performance.now();
      if (typeof hitFeedbackParams !== 'undefined' && hitFeedbackParams.simulateFrequencyHz >= 19) {
        if (hudAttackRepeatLastFireWall > 0) {
          hudAttackRepeatLogEvery++;
          if (hudAttackRepeatLogEvery % 10 === 0) {
            var targetMs = typeof getSimulateIntervalMs === 'function' ? getSimulateIntervalMs() : 50;
            console.log('[HUD Attack repeat] Δms', Math.round(nowWall - hudAttackRepeatLastFireWall), 'target', targetMs, 'Hz', hitFeedbackParams.simulateFrequencyHz);
          }
        }
        hudAttackRepeatLastFireWall = nowWall;
      } else {
        hudAttackRepeatLastFireWall = nowWall;
        hudAttackRepeatLogEvery = 0;
      }
      performAttackOnce();
      var period = typeof getSimulateIntervalMs === 'function' ? getSimulateIntervalMs() : 200;
      if (!hudRepeatPhaseAnchor) hudRepeatPhaseAnchor = nowWall;
      hudRepeatPhaseAnchor += period;
      var wait = Math.max(0, hudRepeatPhaseAnchor - performance.now());
      attackRepeatTimerId = setTimeout(attackRepeatTick, wait);
    }
    function ensureAttackRepeatLoop() {
      if (attackRepeatTimerId != null) return;
      hudRepeatPhaseAnchor = 0;
      var delay = typeof getSimulateIntervalMs === 'function' ? getSimulateIntervalMs() : 200;
      attackRepeatTimerId = setTimeout(attackRepeatTick, delay);
    }
    function performAttackOnce() {
      const continuous = attackHoldActive || attackAutoContinuous;
      const periodMs = typeof getSimulateIntervalMs === 'function' ? getSimulateIntervalMs() : 200;
      const useRapidStrikesWhileAnimating = continuous && periodMs < getFullAttackAnimBlockMs();
      if (isAttacking && useRapidStrikesWhileAnimating) {
        applySlashHitOnly();
        return;
      }
      if (isAttacking) return;
      console.log('Action: Attack');
      isAttacking = true;
      character.setState(CHARACTER_STATES.ATTACK);
      const now = performance.now() / 1000;
      if (now - lastAttackTime < COMBO_WINDOW) console.log('(二段攻击预留)');
      lastAttackTime = now;
      updateEnemyVisible();
      runAttackAnimation();
    }
    function beginAttackHold() {
      attackHoldActive = true;
      updateAttackButtonContinuousVisual();
      performAttackOnce();
      ensureAttackRepeatLoop();
    }
    function endAttackHold() {
      if (!attackHoldActive) return;
      attackHoldActive = false;
      if (!attackAutoContinuous) stopAttackRepeatLoop();
      updateAttackButtonContinuousVisual();
    }
    if (btnAttack) {
      btnAttack.addEventListener('mousedown', function(e) {

        beginAttackHold();
      });
      btnAttack.addEventListener('click', function() {
        if (attackSuppressNextClick) {
          attackSuppressNextClick = false;
          if (attackSuppressClickClearTimer) {
            clearTimeout(attackSuppressClickClearTimer);
            attackSuppressClickClearTimer = null;
          }
          return;

        performAttackOnce();
      });
      window.addEventListener('mouseup', function(e) {
        if (e.button === 0) endAttackHold();
      });

        e.preventDefault();

        beginAttackHold();

      window.addEventListener('touchend', endAttackHold);
      window.addEventListener('touchcancel', endAttackHold);
    }

      chkAttackAuto.addEventListener('change', function() {

    const SKILL_COOLDOWN = 2;

    // ---------- Phase 4：S1/S2 指示器（按下-拖动-释放）+ 取消区，S3 点击即释放 ----------
    window.skillTriggerMode = window.skillTriggerMode || 'directional';

    function createSectorIndicator(radius, angleDeg) {
      const angleRad = (angleDeg * Math.PI) / 180;
      const half = angleRad / 2;
      const shape = new THREE.Shape();
      shape.moveTo(0, 0);
      shape.lineTo(radius * Math.cos(Math.PI / 2 - half), radius * Math.sin(Math.PI / 2 - half));
      shape.absarc(0, 0, radius, Math.PI / 2 - half, Math.PI / 2 + half, false);
      shape.lineTo(0, 0);
      const geom = new THREE.ShapeGeometry(shape);
      const mat = new THREE.MeshBasicMaterial({
        color: 0x4a90e2,
        transparent: true,
        opacity: 0.4,
        side: THREE.DoubleSide
      });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.rotation.order = 'YXZ';
      mesh.rotation.x = -Math.PI / 2;
      mesh.rotation.y = 0;
      mesh.rotation.z = 0;
      mesh.position.y = 0;
      return mesh;
    }

    function createLinearIndicator(length, width) {

      const mesh = new THREE.Mesh(geom, mat);
      mesh.rotation.order = 'YXZ';
      mesh.rotation.x = -Math.PI / 2;
      mesh.rotation.y = 0;
      mesh.rotation.z = 0;
      mesh.position.set(0, 0, length / 2);
      return mesh;
    }

    function isInCancelZone(clientX, clientY) {
      const el = document.getElementById('skillCancelZone');
      if (!el || !el.classList.contains('visible')) return false;
      const r = el.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const radius = Math.min(r.width, r.height) / 2;
      const dx = clientX - cx, dy = clientY - cy;
      return dx * dx + dy * dy <= radius * radius;
    }

    function startSkillAim(skillIndex, clientX, clientY, isTouch, touchId) {
      if (skillAiming !== null) return;
      skillAiming = skillIndex;
      skillButtonCenter.x = clientX;
      skillButtonCenter.y = clientY;
      skillBaseRotation = skillIndex === 1 ? characterFacingYaw + Math.PI : characterFacingYaw;
      if (isTouch) skillTouchId = touchId; else skillMouseActive = true;

      document.getElementById('skillCancelZone').classList.add('visible');
      const pos = character.body.position;
      skillIndicatorPivot = new THREE.Group();
      skillIndicatorPivot.position.set(pos.x, INDICATOR_Y_OFFSET, pos.z);
      if (skillIndex === 1) {
        skillIndicatorMesh = createSectorIndicator(5, 90);
      } else {
        skillIndicatorMesh = createLinearIndicator(10, 2);
      }
      skillIndicatorPivot.add(skillIndicatorMesh);
      skillIndicatorPivot.rotation.y = skillBaseRotation;
      scene.add(skillIndicatorPivot);
    }

    const S1_DRAG_YAW_RANGE = (270 * Math.PI) / 180;
    const S2_DRAG_YAW_RANGE = (180 * Math.PI) / 180;

    function updateSkillAim(clientX, clientY) {
      if (skillAiming === null || !skillIndicatorPivot || !skillIndicatorMesh) return;
      const dx = clientX - skillButtonCenter.x;
      const dy = clientY - skillButtonCenter.y;
      let dragYaw = Math.atan2(-dx, dy) + Math.PI;
      if (dragYaw > Math.PI) dragYaw -= 2 * Math.PI;
      if (skillAiming === 1) {
        dragYaw = Math.max(-S1_DRAG_YAW_RANGE / 2, Math.min(S1_DRAG_YAW_RANGE / 2, dragYaw));
        skillIndicatorPivot.rotation.y = skillBaseRotation - dragYaw;
      } else {
        dragYaw = Math.max(-S2_DRAG_YAW_RANGE / 2, Math.min(S2_DRAG_YAW_RANGE / 2, dragYaw));
        skillIndicatorPivot.rotation.y = skillBaseRotation - dragYaw;
      }
      const inCancel = isInCancelZone(clientX, clientY);
      skillIndicatorMesh.material.color.setHex(inCancel ? 0xff4d4d : 0x4a90e2);
    }

    function endSkillAim(clientX, clientY) {
      if (skillAiming === null) return;
      document.getElementById('skillCancelZone').classList.remove('visible');
      const inCancel = isInCancelZone(clientX, clientY);
      const indicatorYaw = skillIndicatorPivot ? skillIndicatorPivot.rotation.y : 0;
      if (skillIndicatorPivot) {
        if (skillIndicatorMesh) {
          skillIndicatorMesh.geometry.dispose();
          skillIndicatorMesh.material.dispose();
          skillIndicatorMesh = null;
        }
        scene.remove(skillIndicatorPivot);
        skillIndicatorPivot = null;
      }
      if (!inCancel && skillAiming >= 1 && skillAiming <= 2) {
        console.log('Skill ' + skillAiming + ' Cast');
        tryHitEnemyInIndicator(skillAiming, indicatorYaw, SKILL_DAMAGES[skillAiming - 1], 'Skill' + skillAiming);
        startSkillCooldown(skillAiming);
        updateEnemyVisible();
      }
      skillAiming = null;
      skillTouchId = null;
      skillMouseActive = false;
    }

    function onSkillPointerMove(clientX, clientY, touchId) {
      if (skillAiming === null) return;
      if (skillTouchId !== null && touchId !== skillTouchId) return;
      updateSkillAim(clientX, clientY);
    }

    function onSkillPointerEnd(clientX, clientY, touchId) {
      if (skillAiming === null) return;
      if (skillTouchId !== null && touchId !== skillTouchId) return;
      endSkillAim(clientX, clientY);
    }

    [1, 2].forEach(n => {
      const btn = document.getElementById(`btnSkill${n}`);
      btn.addEventListener('mousedown', (e) => {
        e.preventDefault();
        startSkillAim(n, e.clientX, e.clientY, false);
      });
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const t = e.changedTouches[0];
        startSkillAim(n, t.clientX, t.clientY, true, t.identifier);
      }, { passive: false });
    });

    document.addEventListener('mousemove', (e) => {
      if (skillMouseActive) onSkillPointerMove(e.clientX, e.clientY, null);
    });
    document.addEventListener('mouseup', (e) => {
      if (skillMouseActive) onSkillPointerEnd(e.clientX, e.clientY, null);
    });
    document.addEventListener('touchmove', (e) => {
      const t = Array.from(e.changedTouches).find(touch => touch.identifier === skillTouchId);
      if (t) onSkillPointerMove(t.clientX, t.clientY, t.identifier);
    }, { passive: true });
    document.addEventListener('touchend', (e) => {
      const t = Array.from(e.changedTouches).find(touch => touch.identifier === skillTouchId);
      if (t) onSkillPointerEnd(t.clientX, t.clientY, t.identifier);
    });

    const btnSkill3 = document.getElementById('btnSkill3');
    const castS3 = () => {
      console.log('Skill 3 Cast');
      tryHitEnemy(SKILL_RANGES[2], SKILL_DAMAGES[2], 'Skill3');
      startSkillCooldown(3);
      updateEnemyVisible();
    };
    btnSkill3.addEventListener('click', castS3);
    btnSkill3.addEventListener('touchend', (e) => { e.preventDefault(); castS3(); });

    document.getElementById('btnSettings').addEventListener('click', () => {
      if (document.body.classList.contains('debug-hit-feedback')) closeHitFeedbackDebug();
      else openHitFeedbackDebug();
    });
    document.getElementById('btnSettings').addEventListener('touchend', (e) => { e.preventDefault(); document.getElementById('btnSettings').click(); });
    (function initAudioPanel() {
      const btn = document.getElementById('btnAudio');
      const panel = document.getElementById('audioPanel');
      const closeBtn = document.getElementById('audioPanelClose');
      const weaponSel = document.getElementById('audioWeaponSelect');
      const vol = document.getElementById('audioVolume');
      const advToggle = document.getElementById('audioAdvancedToggle');
      const adv = document.getElementById('audioAdvanced');
      const chevron = document.getElementById('audioAdvancedChevron');
      const pGun = document.getElementById('audioPathGun');
      const pDagger = document.getElementById('audioPathDagger');
      const pBlunt = document.getElementById('audioPathBlunt');
      if (!btn || !panel) return;
      if (pGun) pGun.value = PATH_GUN;
      if (pDagger) pDagger.value = PATH_DAGGER;
      if (pBlunt) pBlunt.value = PATH_BLUNT;

      function setOpen(open) {
        panel.classList.toggle('open', !!open);
        panel.setAttribute('aria-hidden', open ? 'false' : 'true');
        if (open && AudioBus) AudioBus.warmUp();
      }
      function toggle() { setOpen(!panel.classList.contains('open')); }
      function setAdvanced(open) {
        adv.classList.toggle('open', !!open);
        adv.setAttribute('aria-hidden', open ? 'false' : 'true');
        advToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        if (chevron) chevron.textContent = open ? '▴' : '▾';
      }

      btn.addEventListener('click', function (e) { e.preventDefault(); toggle(); });
      btn.addEventListener('touchend', function (e) { e.preventDefault(); btn.click(); });
      if (closeBtn) closeBtn.addEventListener('click', function () { setOpen(false); });
      document.addEventListener('mousedown', function (e) {
        if (!panel.classList.contains('open')) return;
        if (panel.contains(e.target) || btn.contains(e.target)) return;
        setOpen(false);
      });
      document.addEventListener('touchstart', function (e) {
        if (!panel.classList.contains('open')) return;
        if (panel.contains(e.target) || btn.contains(e.target)) return;
        setOpen(false);
      }, { passive: true });

      if (advToggle) {
        advToggle.addEventListener('click', function () { setAdvanced(!adv.classList.contains('open')); });
        advToggle.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); advToggle.click(); } });
      }
      setAdvanced(false);

      if (weaponSel) {
        weaponSel.value = 'dagger';
        weaponSel.addEventListener('change', function () {
          AudioBus && AudioBus.warmUp();
          applyWeaponPreset(weaponSel.value);
        });
      }
      if (vol) {
        vol.addEventListener('input', function () {
          const v01 = (parseFloat(vol.value) || 0) / 100;
          AudioBus && AudioBus.setVolume(v01);
        });
        AudioBus && AudioBus.setVolume((parseFloat(vol.value) || 0) / 100);
      }
      function bindPathInput(el, type) {
        if (!el) return;
        el.addEventListener('change', function () { AudioBus && AudioBus.setPath(type, el.value); AudioBus && AudioBus.warmUp(); });
      }
      bindPathInput(pGun, 'gun');
      bindPathInput(pDagger, 'dagger');
      bindPathInput(pBlunt, 'blunt');

      applyWeaponPreset('dagger');
    })();
    // ---------- 移动：摇杆 + 键盘向量 -> 世界 x-z（随相机 yaw）；角色朝向移动方向 ----------
    const forward = new THREE.Vector3();
    const right = new THREE.Vector3();
    let characterFacingYaw = 0;

    function applyMovement(dt) {
      const input = joystickVector.clone().add(keyVector);
      if (input.length() > 1) input.normalize();
      let targetVx = 0, targetVz = 0;
      if (input.length() > 0.05) {
        forward.set(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraYaw);
        right.set(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraYaw);
        targetVx = -(forward.x * input.y + right.x * input.x) * moveSpeed;
        targetVz = -(forward.z * input.y + right.z * input.x) * moveSpeed;
        characterFacingYaw = Math.atan2(targetVx, targetVz);
      }
      character.applyMoveDirection(targetVx, targetVz);
      character.applyMovementVelocity(dt, MOVEMENT_SMOOTH_FACTOR);
    }

    // ---------- 光源 ----------
    const light = new THREE.DirectionalLight(0xffffff, 0.8);
    light.position.set(10, 20, 10);
    light.castShadow = true;
    light.shadow.mapSize.set(1024, 1024);
    light.shadow.camera.near = 0.5;
    light.shadow.camera.far = 50;
    light.shadow.camera.left = -25;
    light.shadow.camera.right = 25;
    light.shadow.camera.top = 25;
    light.shadow.camera.bottom = -25;
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040, 0.4));

    // ---------- 循环 ----------
    let lastTime = performance.now() / 1000;
    function loop() {
      const now = performance.now() / 1000;
      const dt = Math.min(now - lastTime, 0.1);
      lastTime = now;

      world.step(1/60);
      character.body.quaternion.set(0, 0, 0, 1);
      character.body.angularVelocity.set(0, 0, 0);
      var px = character.body.position.x, pz = character.body.position.z;
      var minDistXZ = CAPSULE_RADIUS + Math.sqrt(ENEMY_HALF_W * ENEMY_HALF_W + ENEMY_HALF_D * ENEMY_HALF_D);
      for (var ei = 0; ei < activeEnemies.length; ei++) {
        var en = activeEnemies[ei];
        if (en.dead || !en.body) continue;
        var ex = en.body.position.x, ez = en.body.position.z;
        var dx = px - ex, dz = pz - ez;
        var distXZ = Math.sqrt(dx * dx + dz * dz);
        if (distXZ < minDistXZ && distXZ > 1e-6) {
          var overlap = minDistXZ - distXZ;
          var nx = dx / distXZ, nz = dz / distXZ;
          character.body.position.x += nx * overlap;
          character.body.position.z += nz * overlap;
          px = character.body.position.x;
          pz = character.body.position.z;
        }
      }
      applyMovement(dt);
      updateCharacterState();
      character.updateVisual();
      character.setFacingYaw(characterFacingYaw);
      character.group.position.add(attackOffset);
      if (window.TWEEN) window.TWEEN.update(performance.now()); /* CRITICAL: required for ghost bar and any Tween to play */
      if (skillAiming !== null && skillIndicatorPivot) {
        skillIndicatorPivot.position.copy(character.body.position);
        skillIndicatorPivot.position.y = INDICATOR_Y_OFFSET;
      }
      updateCamera(dt);

      const hpLerp = 1 - Math.exp(-(hitFeedbackParams.dropSpeed || 2) * dt);
      displayedPlayerHP += (playerHP - displayedPlayerHP) * Math.min(1, hpLerp);
      const displayPct = (playerHP / playerMaxHP * 100) + '%';

      if (hpMainEl) hpMainEl.style.width = displayPct;
      if (hpGhostEl) hpGhostEl.style.background = toCssColor(hitFeedbackParams.dropColorFlash) || 'rgba(255,100,100,0.95)';
      if (playerWorldBarGhostEl) playerWorldBarGhostEl.style.background = toCssColor(hitFeedbackParams.dropColorFlash) || 'rgba(255,100,100,0.9)';
      if (hpTextEl) {
        hpTextEl.textContent = Math.round(displayedPlayerHP) + '/' + playerMaxHP;
        hpTextEl.style.color = toCssColor(hitFeedbackParams.healthBarValueColor);
        hpTextEl.style.fontSize = (hitFeedbackParams.healthBarValueSize != null ? hitFeedbackParams.healthBarValueSize : 12) + 'px';
      }
      if (healthBarHighlightUntil > 0) {
        healthBarHighlightUntil -= dt;
        if (hpContainerEl) hpContainerEl.classList.add('hit-highlight');
      } else {
        if (hpContainerEl) hpContainerEl.classList.remove('hit-highlight');
      }
      if (performance.now() / 1000 > lastDamageShowUntil) healthBarValueEl.style.opacity = '0';

      // 胶囊体受击闪色（Phase 5）
      if (capsuleFlashUntil > 0) {
        capsuleFlashUntil -= dt;
        if (character.visualMesh && character.visualMesh.material) {
          if (character.visualMesh.material.emissive) character.visualMesh.material.emissive.lerp(new THREE.Color(0x111111), 0.15);
        }
      }

      // 2D 血条挂在模型正上方：叠加区域随 Debug 模式变化，保证在 3D 视图内
      const overlayRect = getOverlayRect();
      var overlayTop = overlayRect.top != null ? overlayRect.top : 0;
      updateWorldBarFrustum(camera);
      character.group.updateWorldMatrix(true, true);
      let playerBarWorldY;
      const playerTopY = character.visualMesh ? getMeshTopY(character.visualMesh) : null;
      if (playerTopY != null) playerBarWorldY = playerTopY + WORLD_HEALTH_BAR_MARGIN;
      else
        playerBarWorldY = character.body.position.y + (CAPSULE_HEIGHT - 2 * CAPSULE_RADIUS) + 0.3;
      _barAnchorWorld.set(character.body.position.x, playerBarWorldY, character.body.position.z);
      const playerBarVisible = isWorldTrackedBarAnchorVisible(_barAnchorWorld, camera, projectVec);
      const playerBarPx = overlayRect.left + (projectVec.x * 0.5 + 0.5) * overlayRect.width;
      const playerBarPy = overlayTop + (1 - (projectVec.y * 0.5 + 0.5)) * overlayRect.height;
      const playerWorldBar = document.getElementById('playerWorldBar');
      const playerWorldBarFill = document.getElementById('playerWorldBarFill');
      if (playerWorldBar) {
        playerWorldBar.style.visibility = playerBarVisible ? 'visible' : 'hidden';
        if (playerBarVisible) {
          playerWorldBar.style.left = playerBarPx + 'px';
          playerWorldBar.style.top = playerBarPy + 'px';
        }
      }
      if (playerWorldBarFill) playerWorldBarFill.style.width = displayPct;
      const playerWorldBarHp = document.getElementById('playerWorldBarHp');
      if (playerWorldBarHp) {
        playerWorldBarHp.textContent = Math.round(displayedPlayerHP) + '/' + playerMaxHP;
        playerWorldBarHp.style.color = toCssColor(hitFeedbackParams.healthBarValueColor);
        playerWorldBarHp.style.fontSize = (hitFeedbackParams.healthBarValueSize != null ? hitFeedbackParams.healthBarValueSize : 10) + 'px';
      }
      for (let ei = 0; ei < activeEnemies.length; ei++) {
        const enemy = activeEnemies[ei];
        if (enemy.dead || enemy.hp <= 0) continue;
        enemy.group.updateWorldMatrix(true, true);
        let enemyBarWorldY;
        const enemyTopY = getMeshTopY(enemy.mesh);
        if (enemyTopY != null) enemyBarWorldY = enemyTopY + WORLD_HEALTH_BAR_MARGIN;
        else enemyBarWorldY = enemy.position.y + 1.2;
        _barAnchorWorld.set(enemy.position.x, enemyBarWorldY, enemy.position.z);
        const enemyBarVisible = isWorldTrackedBarAnchorVisible(_barAnchorWorld, camera, projectVec);
        const enemyBarPx = overlayRect.left + (projectVec.x * 0.5 + 0.5) * overlayRect.width;
        const enemyBarPy = overlayTop + (1 - (projectVec.y * 0.5 + 0.5)) * overlayRect.height;
        const wb = enemy.worldBar;
        if (wb && wb.wrap) {
          wb.wrap.style.visibility = enemyBarVisible ? 'visible' : 'hidden';
          if (enemyBarVisible) {
            wb.wrap.style.left = enemyBarPx + 'px';
            wb.wrap.style.top = enemyBarPy + 'px';
          }
          wb.fill.style.width = (enemy.hp / enemy.maxHp * 100) + '%';
          if (wb.ghost && !enemy.ghostTween) wb.ghost.style.width = (enemy.hp / enemy.maxHp * 100) + '%';
          if (wb.hpSpan) {
            wb.hpSpan.textContent = Math.round(enemy.hp) + '/' + enemy.maxHp;
            wb.hpSpan.style.color = toCssColor(hitFeedbackParams.healthBarValueColor);
            wb.hpSpan.style.fontSize = (hitFeedbackParams.healthBarValueSize != null ? hitFeedbackParams.healthBarValueSize : 10) + 'px';
          }
        }
      }

      const FLOAT_TEXT_GRAVITY_MULT = 300;
      // 飘字：持久 velocity；屏幕 Y 向下为正，重力使 velY 每帧增加；位置 += velocity * dt
      function updateFloatingText() {
        const now = performance.now();
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
          const ft = floatingTexts[i];
          ft.time += dt;
          const dur = ft.duration != null ? ft.duration : 1;
          const progress = Math.min(1, ft.time / dur);
          const screen = projectWorldToScreen(ft.worldPos, camera);
          if (screen.behind) {
            ft.div.style.display = 'none';
          } else {
            ft.div.style.display = '';
            const off = applyValuePositionOffset(screen.x, screen.y, hitFeedbackParams.valuePosition);
            let px = off.px, py = off.py + (ft.queueOffsetY || 0);
            const motion = hitFeedbackParams.motion;
            if (motion && (motion.directionMode === 'Fixed' || motion.directionMode === 'Manual')) {
              if (ft.velX == null || ft.velY == null) {
                const intensity = motion.vectorIntensity != null ? motion.vectorIntensity : 80;
                let vx = 0, vy = -1;
                if (motion.directionMode === 'Manual') {
                  const mx = motion.manualOffsetX != null ? motion.manualOffsetX : 0;
                  const my = motion.manualOffsetY != null ? motion.manualOffsetY : -50;
                  const len = Math.sqrt(mx * mx + my * my) || 1;
                  vx = mx / len; vy = my / len;
                } else {
                  const vec = DIRECTION_VECTORS[motion.directionPreset] || DIRECTION_VECTORS['上'];
                  vx = vec.x; vy = vec.y;
                }
                ft.velX = vx * intensity;
                ft.velY = vy * intensity;
              }
              if (ft.px == null || ft.py == null) { ft.px = px; ft.py = py; }
              if (ft.motionOffsetX == null || ft.motionOffsetY == null) {
                ft.motionOffsetX = ft.px - px;
                ft.motionOffsetY = ft.py - py;
              }
              const gravity = motion.gravity != null ? motion.gravity : 0;
              ft.velY += gravity * dt * FLOAT_TEXT_GRAVITY_MULT;
              ft.motionOffsetX += ft.velX * dt;
              ft.motionOffsetY += ft.velY * dt;
              ft.px = px + ft.motionOffsetX;
              ft.py = py + ft.motionOffsetY;
              px = ft.px;
              py = ft.py;
            } else {
              const offY = ft.time * 40;
              py -= offY;
            }
            let shakeX = 0, shakeY = 0;
            if (ft.animType === 'randomShake') {
              shakeX = (Math.random() - 0.5) * 8;
              shakeY = (Math.random() - 0.5) * 4;
            }
            const scaleConfig = hitFeedbackParams.scale;
            let scale = 1;
            if (scaleConfig && scaleConfig.sizeCurve) {
              const fScale = Math.max(0, evaluateCurve(scaleConfig.sizeCurve, progress));
              const maxS = scaleConfig.maxScale != null ? scaleConfig.maxScale : (scaleConfig.baseScale != null ? scaleConfig.baseScale : 1);
              scale = fScale * maxS;
              if (!ft.hitStopFired && scale > 1.2 && progress <= 0.2) {
                ft.hitStopFired = true;
                floatingTextHitStopUntil = now + (typeof HIT_STOP_MS !== 'undefined' ? HIT_STOP_MS : 50);
              }
            } else if (ft.animType === 'zoomPop' && ft.isCritical) {
              const t = Math.min(1, ft.time / 0.15);
              scale = t < 0.5 ? 0.1 + t * 2.8 : (1.5 - (t - 0.5) * 1);
            }
            const fadeConfig = hitFeedbackParams.fade;
            let opacity = 1;
            if (fadeConfig && fadeConfig.alphaCurve) {
              opacity = Math.max(0, Math.min(1, evaluateCurve(fadeConfig.alphaCurve, progress)));
            } else {
              opacity = Math.max(0, 1 - progress);
            }
            ft.div.style.left = (px + shakeX) + 'px';
            ft.div.style.top = (py + shakeY) + 'px';
            ft.div.style.transform = 'translate(-50%,0) scale(' + scale + ')';
            ft.div.style.opacity = opacity;
            ft.div.style.visibility = 'visible';
          }
          if (ft.time >= dur) { floatingDamageContainer.removeChild(ft.div); floatingTexts.splice(i, 1); }
        }
      }
      updateFloatingText();

      // 小地图：正交相机跟随玩家 x,z，用独立 renderer 画到小地图 canvas（不修改主 renderer）
      try {
        const pos = character.body.position;
        minimapCamera.position.set(pos.x, 25, pos.z);
        minimapCamera.lookAt(pos.x, 0, pos.z);
        minimapCamera.updateProjectionMatrix();
        resizeMinimap();
        if (useMinimap && minimapRenderer && minimapCanvas.width > 0 && minimapCanvas.height > 0) minimapRenderer.render(scene, minimapCamera);
        minimapArrow.style.transform = `rotate(${(cameraYaw * 180 / Math.PI)}deg)`;
        const minimapEnemyMarkers = document.getElementById('minimapEnemyMarkers');
        if (minimapEnemyMarkers) {
          const rect = minimapContainer.getBoundingClientRect();
          const mw = rect.width, mh = rect.height;
          for (let ei = 0; ei < activeEnemies.length; ei++) {
            const enemy = activeEnemies[ei];
            if (!enemy.minimapMarkerEl || enemy.dead || enemy.hp <= 0) {
              if (enemy.minimapMarkerEl) enemy.minimapMarkerEl.style.display = 'none';
              continue;
            }
            let ex = (enemy.position.x - pos.x) / MINIMAP_SIZE + 0.5;
            let ez = (enemy.position.z - pos.z) / MINIMAP_SIZE + 0.5;
            ex = Math.max(0, Math.min(1, ex));
            ez = Math.max(0, Math.min(1, ez));
            enemy.minimapMarkerEl.style.left = (ex * mw) + 'px';
            enemy.minimapMarkerEl.style.top = ((1 - ez) * mh) + 'px';
            enemy.minimapMarkerEl.style.display = '';
          }
        }
      } catch (e) { console.warn('Minimap:', e); }

      // 主场景仅由主 renderer 渲染一次
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }
    spawnInitialEnemies(3);
    requestAnimationFrame(loop);
  </script>
</body>
</html>
